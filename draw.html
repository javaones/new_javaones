<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>绘画小程序</title>
  <style>
    :root{--bg1:#07111f;--bg2:#0d1730;--card:rgba(255,255,255,.08);--border:rgba(255,255,255,.14);--text:#eef6ff;--muted:#a8b7cc;--shadow:0 24px 60px rgba(0,0,0,.32)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(56,189,248,.2),transparent 28%),radial-gradient(circle at top right,rgba(139,92,246,.16),transparent 24%),linear-gradient(180deg,var(--bg1),var(--bg2));overflow:auto}
    .blob{position:fixed;width:300px;height:300px;border-radius:50%;filter:blur(32px);opacity:.18;pointer-events:none;z-index:0;animation:floaty 12s ease-in-out infinite}.blob.one{top:8%;left:-90px;background:#38bdf8}.blob.two{right:-90px;bottom:8%;background:#8b5cf6;animation-direction:reverse}@keyframes floaty{0%,100%{transform:translateY(0) translateX(0)}50%{transform:translateY(-18px) translateX(18px)}}
    .app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:20px;display:grid;grid-template-columns:320px 1fr;gap:18px;min-height:100vh}
    .panel{background:var(--card);border:1px solid var(--border);backdrop-filter:blur(16px);border-radius:26px;box-shadow:var(--shadow)}
    .sidebar{max-height:calc(100vh - 40px);overflow:auto;padding:20px;display:grid;gap:16px;align-content:start;scrollbar-width:thin}.sidebar::-webkit-scrollbar,.canvas-wrap::-webkit-scrollbar{width:10px;height:10px}.sidebar::-webkit-scrollbar-thumb,.canvas-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.22);border-radius:999px}
    .brand,.group,.status-box{background:rgba(7,17,31,.55);border:1px solid rgba(255,255,255,.08);border-radius:22px}.brand{padding:18px}.badge{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(56,189,248,.14);border:1px solid rgba(56,189,248,.22);color:#a5f3fc;font-size:13px;margin-bottom:12px}h1{margin:0;font-size:30px;line-height:1.1}.subtitle{margin:10px 0 0;color:var(--muted);font-size:14px;line-height:1.75}
    .group{padding:16px}.group h3{margin:0 0 12px;font-size:16px}.row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    button,.color-btn{appearance:none;border:none;cursor:pointer;border-radius:14px;padding:12px 14px;font-size:14px;font-weight:700;color:#fff;transition:transform .18s ease,box-shadow .18s ease,filter .18s ease,border-color .18s ease}
    button:hover,.color-btn:hover{transform:translateY(-2px);filter:brightness(1.05)}button:active,.color-btn:active{transform:translateY(0)}
    .btn-primary{background:linear-gradient(135deg,#22c55e,#06b6d4);box-shadow:0 14px 24px rgba(6,182,212,.18)}.btn-secondary{background:linear-gradient(135deg,#8b5cf6,#ec4899);box-shadow:0 14px 24px rgba(139,92,246,.18)}.btn-dark{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1)}.btn-warn{background:linear-gradient(135deg,#f59e0b,#ef4444);box-shadow:0 14px 24px rgba(245,158,11,.18)}
    .tool-btn.active,.color-btn.active{outline:2px solid rgba(255,255,255,.9);outline-offset:2px;transform:translateY(-2px) scale(1.02);box-shadow:0 0 0 4px rgba(255,255,255,.08)}
    .color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.color-btn{height:38px;padding:0;border:2px solid rgba(255,255,255,.14);box-shadow:none}
    .slider-wrap{display:grid;gap:10px}.slider-wrap label{display:flex;justify-content:space-between;color:var(--muted);font-size:13px}input[type=range]{width:100%;accent-color:#38bdf8}
    .status-box{padding:14px 16px;color:var(--muted);font-size:13px;line-height:1.7}
    .canvas-panel{display:grid;grid-template-rows:auto 1fr;min-height:calc(100vh - 40px);overflow:hidden}.toolbar{padding:16px 18px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(7,17,31,.35);border-top-left-radius:26px;border-top-right-radius:26px}.toolbar-left,.toolbar-right{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.pill{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--muted);font-size:13px}
    .canvas-wrap{position:relative;overflow:auto;background:radial-gradient(circle at 20% 20%,rgba(56,189,248,.06),transparent 22%),radial-gradient(circle at 80% 80%,rgba(139,92,246,.06),transparent 26%),linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01))}canvas{display:block;touch-action:none;cursor:crosshair}.hint,.toast{position:absolute;padding:10px 14px;border-radius:999px;background:rgba(7,17,31,.7);border:1px solid rgba(255,255,255,.08);color:var(--muted);font-size:13px;pointer-events:none}.hint{left:18px;bottom:18px}.toast{right:18px;bottom:18px;background:rgba(34,197,94,.14);border-color:rgba(34,197,94,.24);color:#bbf7d0;opacity:0;transform:translateY(10px);transition:all .2s ease}.toast.show{opacity:1;transform:translateY(0)}
    @media (max-width:980px){body{overflow:auto}.app{grid-template-columns:1fr;min-height:auto}.canvas-panel{min-height:76vh}.sidebar{max-height:none}}@media (max-width:640px){.app{padding:12px}.sidebar,.toolbar{padding:14px}.row{grid-template-columns:1fr 1fr}.color-grid{grid-template-columns:repeat(4,1fr)}.toolbar-left,.toolbar-right{width:100%}.toolbar{justify-content:flex-start}}
  </style>
</head>
<body>
  <div class="blob one"></div><div class="blob two"></div>
  <div class="app">
    <aside class="panel sidebar">
      <div class="brand"><div class="badge">深圳市大鹏外国语小学</div><h1>绘画小程序</h1><p class="subtitle">支持画笔、直线、矩形、圆形、箭头、文字、导入图片、撤销恢复、清空重置。图形工具支持拖拽预览，松开后完成绘制。</p></div>
      <div class="group"><h3>工具</h3><div class="row">
        <button class="tool-btn btn-primary active" id="penBtn">画笔</button>
        <button class="tool-btn btn-dark" id="lineBtn">直线</button>
        <button class="tool-btn btn-dark" id="rectBtn">矩形</button>
        <button class="tool-btn btn-dark" id="circleBtn">圆形</button>
        <button class="tool-btn btn-dark" id="arrowBtn">箭头</button>
        <button class="tool-btn btn-dark" id="textBtn">文字</button>
        <button class="tool-btn btn-warn" id="undoBtn">撤销</button>
        <button class="tool-btn btn-warn" id="redoBtn">恢复</button>
        <button class="tool-btn btn-dark" id="clearBtn">清空</button>
        <button class="tool-btn btn-dark" id="resetBtn">重置</button>
      </div></div>
      <div class="group"><h3>颜色</h3><div class="color-grid" id="colorGrid"></div></div>
      <div class="group slider-wrap"><h3>画笔粗细</h3><label for="sizeRange"><span>细</span><span id="sizeText">10px</span></label><input id="sizeRange" type="range" min="1" max="40" value="10" /></div>
      <div class="group slider-wrap"><h3>不透明度</h3><label for="alphaRange"><span>透明</span><span id="alphaText">100%</span></label><input id="alphaRange" type="range" min="10" max="100" value="100" /></div>
      <div class="group"><h3>快捷功能</h3><div class="row"><button class="btn-dark" id="saveBtn">保存图片</button><button class="btn-dark" id="bgBtn">切换背景</button></div><div class="row" style="margin-top:10px;"><button class="btn-dark" id="gridBtn">网格参考</button><button class="btn-dark" id="clearTextBtn">清除文字</button></div><div class="row" style="margin-top:10px;"><button class="btn-dark" id="importBtn">导入图片</button><button class="btn-dark" id="fitBtn">适配图片</button></div><input id="imageInput" type="file" accept="image/*" hidden /></div>
      <div class="status-box" id="statusBox">当前模式：画笔。按住鼠标左键拖动即可绘画。</div>
    </aside>
    <section class="panel canvas-panel"><div class="toolbar"><div class="toolbar-left"><div class="pill" id="toolInfo">工具：画笔</div><div class="pill" id="colorInfo">颜色：#38bdf8</div><div class="pill" id="historyInfo" style="display:none;">历史：0 步</div></div><div class="toolbar-right"><div class="pill">支持拖拽预览</div><div class="pill">支持图片底图与绘制叠加</div></div></div><div class="canvas-wrap" id="canvasWrap"><canvas id="drawCanvas"></canvas><div class="hint">提示：拖拽绘制，图形工具支持实时预览</div><div class="toast" id="toast">已保存图片</div></div></section>
  </div>
  <script>
    const canvas=document.getElementById('drawCanvas'),wrap=document.getElementById('canvasWrap'),ctx=canvas.getContext('2d');
    const colorGrid=document.getElementById('colorGrid'),sizeRange=document.getElementById('sizeRange'),alphaRange=document.getElementById('alphaRange'),sizeText=document.getElementById('sizeText'),alphaText=document.getElementById('alphaText'),historyInfo=document.getElementById('historyInfo');
    const penBtn=document.getElementById('penBtn'),lineBtn=document.getElementById('lineBtn'),rectBtn=document.getElementById('rectBtn'),circleBtn=document.getElementById('circleBtn'),arrowBtn=document.getElementById('arrowBtn'),textBtn=document.getElementById('textBtn'),undoBtn=document.getElementById('undoBtn'),redoBtn=document.getElementById('redoBtn'),clearBtn=document.getElementById('clearBtn'),resetBtn=document.getElementById('resetBtn'),saveBtn=document.getElementById('saveBtn'),bgBtn=document.getElementById('bgBtn'),gridBtn=document.getElementById('gridBtn'),clearTextBtn=document.getElementById('clearTextBtn'),importBtn=document.getElementById('importBtn'),fitBtn=document.getElementById('fitBtn'),imageInput=document.getElementById('imageInput'),toolInfo=document.getElementById('toolInfo'),colorInfo=document.getElementById('colorInfo'),statusBox=document.getElementById('statusBox'),toast=document.getElementById('toast');
    const colors=['#38bdf8','#8b5cf6','#22c55e','#f59e0b','#fb7185','#ffffff','#111827','#ef4444','#14b8a6','#eab308'];
    const state={tool:'pen',color:colors[0],size:10,alpha:1,backgroundDark:true,showGrid:false,importedImage:null,textItems:[],shapes:[],undoStack:[],redoStack:[],drawing:false,startX:0,startY:0,lastX:0,lastY:0,preview:null,tempPath:[]};
    const clone=v=>JSON.parse(JSON.stringify(v));
    function fitCanvas(){const r=wrap.getBoundingClientRect();canvas.width=Math.max(1,Math.floor(r.width*devicePixelRatio));canvas.height=Math.max(1,Math.floor(r.height*devicePixelRatio));canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}
    function pnt(e){const r=canvas.getBoundingClientRect(),x=e.touches?e.touches[0].clientX:e.clientX,y=e.touches?e.touches[0].clientY:e.clientY;return{x:x-r.left,y:y-r.top}}
    function toastMsg(t){toast.textContent=t;toast.classList.add('show');clearTimeout(toastMsg.t);toastMsg.t=setTimeout(()=>toast.classList.remove('show'),1200)}
    function updateToolButtons(){document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));const map={pen:penBtn,line:lineBtn,rect:rectBtn,circle:circleBtn,arrow:arrowBtn,text:textBtn};map[state.tool]?.classList.add('active')}
    function setTool(t){state.tool=t;updateToolButtons();const labels={pen:'画笔',line:'直线',rect:'矩形',circle:'圆形',arrow:'箭头',text:'文字'};toolInfo.textContent=`工具：${labels[t]}`;statusBox.textContent=t==='pen'?'当前模式：画笔。按住左键拖动即可绘画。':`当前模式：${labels[t]}。拖动时会显示预览轨迹。`}
    function capture(){return{shapes:clone(state.shapes),textItems:clone(state.textItems),importedImage:state.importedImage?state.importedImage.src:null,backgroundDark:state.backgroundDark,showGrid:state.showGrid,color:state.color,size:state.size,alpha:state.alpha,tool:state.tool}}
    function snapshot(){state.undoStack.push(capture());state.redoStack=[];historyInfo.textContent=`历史：${state.undoStack.length} 步`}
    function restore(item){state.shapes=clone(item.shapes);state.textItems=clone(item.textItems);state.backgroundDark=item.backgroundDark;state.showGrid=item.showGrid;state.color=item.color;state.size=item.size;state.alpha=item.alpha;state.tool=item.tool;state.importedImage=null;if(item.importedImage){const img=new Image();img.onload=()=>{state.importedImage=img;redraw()};img.src=item.importedImage}redraw();syncUI()}
    function undo(){if(!state.undoStack.length)return;state.redoStack.push(capture());const item=state.undoStack.pop();historyInfo.textContent=`历史：${state.undoStack.length} 步`;restore(item)}
    function redo(){if(!state.redoStack.length)return;state.undoStack.push(capture());const item=state.redoStack.pop();historyInfo.textContent=`历史：${state.undoStack.length} 步`;restore(item)}
    function clearCanvasOnly(){state.drawing=false;state.shapes=[];state.textItems=[];state.preview=null;state.tempPath=[];state.undoStack=[];state.redoStack=[];historyInfo.textContent='历史：0 步';redraw();toastMsg('画布已清空')}
    function resetSettings(){state.tool='pen';state.color=colors[0];state.size=10;state.alpha=1;state.backgroundDark=true;state.showGrid=false;state.importedImage=null;state.textItems=[];state.shapes=[];state.undoStack=[];state.redoStack=[];state.preview=null;state.tempPath=[];sizeRange.value='10';alphaRange.value='100';sizeText.textContent='10px';alphaText.textContent='100%';syncUI();redraw();toastMsg('所有设置已恢复初始值')}
    function syncUI(){colorInfo.textContent=`颜色：${state.color}`;document.querySelectorAll('.color-btn').forEach((el,i)=>el.classList.toggle('active',colors[i]===state.color));updateToolButtons()}
    function paintBackground(){const r=wrap.getBoundingClientRect();ctx.save();ctx.fillStyle=state.backgroundDark?'#0c1426':'#f8fbff';ctx.fillRect(0,0,r.width,r.height);const g=ctx.createLinearGradient(0,0,r.width,r.height);g.addColorStop(0,state.backgroundDark?'rgba(56,189,248,.04)':'rgba(56,189,248,.08)');g.addColorStop(1,state.backgroundDark?'rgba(139,92,246,.04)':'rgba(139,92,246,.06)');ctx.fillStyle=g;ctx.fillRect(0,0,r.width,r.height);if(state.showGrid){ctx.strokeStyle=state.backgroundDark?'rgba(255,255,255,.08)':'rgba(15,23,42,.08)';ctx.lineWidth=1;for(let x=0;x<r.width;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,r.height);ctx.stroke()}for(let y=0;y<r.height;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(r.width,y);ctx.stroke()}}ctx.restore()}
    function drawTextItems(){ctx.save();state.textItems.forEach(it=>{ctx.globalAlpha=it.alpha;ctx.fillStyle=it.color;ctx.font=`${it.size}px "Segoe UI", "PingFang SC", sans-serif`;ctx.fillText(it.text,it.x,it.y)});ctx.restore()}
    function drawShape(s,a=s.alpha){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=s.color;ctx.fillStyle=s.color;ctx.lineWidth=s.size;ctx.lineCap='round';ctx.lineJoin='round';if(s.kind==='line'||s.kind==='preview-line'){ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke()}else if(s.kind==='rect'){const x=Math.min(s.x1,s.x2),y=Math.min(s.y1,s.y2),w=Math.abs(s.x2-s.x1),h=Math.abs(s.y2-s.y1);ctx.strokeRect(x,y,w,h)}else if(s.kind==='circle'){const r=Math.sqrt((s.x2-s.x1)**2+(s.y2-s.y1)**2);ctx.beginPath();ctx.arc(s.x1,s.y1,r,0,Math.PI*2);ctx.stroke()}else if(s.kind==='arrow'){const ang=Math.atan2(s.y2-s.y1,s.x2-s.x1),head=Math.max(12,s.size*2.4);ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();ctx.beginPath();ctx.moveTo(s.x2,s.y2);ctx.lineTo(s.x2-head*Math.cos(ang-Math.PI/6),s.y2-head*Math.sin(ang-Math.PI/6));ctx.lineTo(s.x2-head*Math.cos(ang+Math.PI/6),s.y2-head*Math.sin(ang+Math.PI/6));ctx.closePath();ctx.fill()}else if(s.kind==='path'){if(!s.points.length)return;ctx.beginPath();ctx.moveTo(s.points[0].x,s.points[0].y);for(const p of s.points.slice(1))ctx.lineTo(p.x,p.y);ctx.stroke()}ctx.restore()}
    function redraw(){paintBackground();if(state.importedImage)ctx.drawImage(state.importedImage,0,0,wrap.clientWidth,wrap.clientHeight);state.shapes.forEach(s=>drawShape(s));if(state.preview)drawShape(state.preview,.42);drawTextItems()}
    function loadImportedImage(src){const img=new Image();img.onload=()=>{state.importedImage=img;redraw();toastMsg('图片已导入')};img.src=src}
    function commitShape(endPoint){state.shapes.push({kind:state.tool,x1:state.startX,y1:state.startY,x2:endPoint.x,y2:endPoint.y,size:state.size,color:state.color,alpha:state.alpha});state.preview=null;state.tempPath=[];state.drawing=false;snapshot();redraw()}
    function startDraw(x,y){if(state.tool==='text')return;state.drawing=true;state.startX=x;state.startY=y;state.lastX=x;state.lastY=y;state.tempPath=[{x,y}];state.preview=null;if(state.tool==='pen')snapshot()}
    function moveDraw(x,y){if(!state.drawing)return;if(state.tool==='pen'){state.tempPath.push({x,y});const p=state.tempPath[state.tempPath.length-2];state.shapes.push({kind:'path',points:[{x:p.x,y:p.y},{x,y}],size:state.size,color:state.color,alpha:state.alpha});redraw()}else if(['line','rect','circle','arrow'].includes(state.tool)){state.preview={kind:state.tool,x1:state.startX,y1:state.startY,x2:x,y2:y,size:state.size,color:state.color,alpha:state.alpha};redraw()}state.lastX=x;state.lastY=y}
    function stopDraw(e){if(!state.drawing)return;const ep=e?pnt(e):{x:state.lastX,y:state.lastY};if(state.tool==='pen'){state.drawing=false;state.tempPath=[];snapshot();redraw();return}if(['line','rect','circle','arrow'].includes(state.tool)){commitShape(ep);return}state.drawing=false;state.tempPath=[];state.preview=null;redraw()}
    function exportImage(){const a=document.createElement('a');a.download=`绘画作品-${Date.now()}.png`;a.href=canvas.toDataURL('image/png');a.click();toastMsg('已保存图片')}
    colors.forEach(c=>{const b=document.createElement('button');b.className='color-btn';b.style.background=c;b.title=c;b.addEventListener('click',()=>{state.color=c;syncUI();setTool('pen')});if(c===state.color)b.classList.add('active');colorGrid.appendChild(b)});
    sizeRange.addEventListener('input',()=>{state.size=Number(sizeRange.value);sizeText.textContent=`${state.size}px`});alphaRange.addEventListener('input',()=>{state.alpha=Number(alphaRange.value)/100;alphaText.textContent=`${alphaRange.value}%`});
    penBtn.addEventListener('click',()=>setTool('pen'));lineBtn.addEventListener('click',()=>setTool('line'));rectBtn.addEventListener('click',()=>setTool('rect'));circleBtn.addEventListener('click',()=>setTool('circle'));arrowBtn.addEventListener('click',()=>setTool('arrow'));textBtn.addEventListener('click',()=>{const t=prompt('请输入要添加的文字');if(!t)return;state.textItems.push({text:t,x:wrap.clientWidth/2-40,y:wrap.clientHeight/2,size:Math.max(18,state.size*2),color:state.color,alpha:state.alpha});snapshot();redraw();toastMsg('已添加文字');setTool('text')});
    undoBtn.addEventListener('click',undo);redoBtn.addEventListener('click',redo);clearBtn.addEventListener('click',clearCanvasOnly);resetBtn.addEventListener('click',resetSettings);saveBtn.addEventListener('click',exportImage);bgBtn.addEventListener('click',()=>{state.backgroundDark=!state.backgroundDark;redraw();toastMsg(state.backgroundDark?'已切换深色背景':'已切换浅色背景')});gridBtn.addEventListener('click',()=>{state.showGrid=!state.showGrid;redraw();toastMsg(state.showGrid?'网格参考已开启':'网格参考已关闭')});clearTextBtn.addEventListener('click',()=>{state.textItems=[];snapshot();redraw();toastMsg('文字已清除')});
    importBtn.addEventListener('click',()=>imageInput.click());imageInput.addEventListener('change',()=>{const file=imageInput.files&&imageInput.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>loadImportedImage(reader.result);reader.readAsDataURL(file);imageInput.value=''});fitBtn.addEventListener('click',()=>{if(!state.importedImage)return toastMsg('请先导入图片');redraw();toastMsg('图片已适配画布')});
    canvas.addEventListener('mousedown',e=>{if(e.button!==0)return;const p=pnt(e);startDraw(p.x,p.y)});canvas.addEventListener('mousemove',e=>{if(!state.drawing)return;const p=pnt(e);moveDraw(p.x,p.y)});window.addEventListener('mouseup',stopDraw);canvas.addEventListener('mouseleave',()=>{if(state.drawing)stopDraw()});canvas.addEventListener('touchstart',e=>{e.preventDefault();const p=pnt(e);startDraw(p.x,p.y)},{passive:false});canvas.addEventListener('touchmove',e=>{e.preventDefault();const p=pnt(e);moveDraw(p.x,p.y)},{passive:false});window.addEventListener('touchend',stopDraw);window.addEventListener('resize',()=>{fitCanvas();redraw()});
    sizeText.textContent='10px';alphaText.textContent='100%';fitCanvas();paintBackground();redraw();setTool('pen');
  </script>
</body>
</html>
